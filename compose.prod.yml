services:
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE_PREFIX:-ghcr.io/b3-martigues/mycookbook}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/mycookbook
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - recipe_images:/app/img/recipes
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: ${IMAGE_PREFIX:-ghcr.io/b3-martigues/mycookbook}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongodb_data:
  recipe_images:

