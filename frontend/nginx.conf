server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ^~ /img/ {
    proxy_pass http://backend:8080;
  }

  location ~ ^/(register|login|refresh-token|logout|get-profile|update-profile|delete-profile|recipes|user-recipes|add-recipe|search-recipes|favorites|add-favorite|delete-favorite|ratings|add-rating|comments)(/|$) {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
