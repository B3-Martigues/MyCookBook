name: Deploy production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (latest, v1.2.3 or sha-xxxxxxx)
        required: true
        default: latest

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Upload production manifest
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'mkdir -p "${{ secrets.DEPLOY_PATH }}"'
          scp compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/compose.prod.yml"
      - name: Pull and restart services
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'cd "${{ secrets.DEPLOY_PATH }}" && IMAGE_TAG="${{ inputs.image_tag }}" docker compose -f compose.prod.yml pull && IMAGE_TAG="${{ inputs.image_tag }}" docker compose -f compose.prod.yml up -d --remove-orphans && docker image prune -f'

